name: ultimate_airport_leech

on:
  workflow_dispatch:
  push:
    paths:
      - 'ultimate_airport_leech.py'
      - '.github/workflows/ultimate_airport_leech.yml'
      
  schedule:
    - cron: '0 */6 * * *' # 每6小时运行一次

jobs:
  leech_task:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Public Script
        uses: actions/checkout@v4

      - name: Checkout Private Data Repo
        uses: actions/checkout@v4
        with:
          repository: qjlxg/362
          token: ${{ secrets.GH_TOKEN }}
          path: private_folder  

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libsm6 libxrender1 libxext6

      - name: Install Python Dependencies
        run: |
          pip install curl_cffi ddddocr opencv-python-headless numpy requests urllib3 json5 beautifulsoup4 pyyaml

      - name: Run Leech Engine
        run: python ultimate_airport_leech.py
        env:
          TZ: Asia/Shanghai
          DATA_PATH: private_folder/data

      - name: Commit and Push Results to Private Repo
        run: |
          cd private_folder
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 仅暂存结果文件
          git add data/airport_master.cache data/subscribes.txt data/nodes.txt data/airport_error.cache
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update subscription nodes [$(date +'%Y-%m-%d %H:%M:%S')]"
            git pull --rebase origin main
            git push origin main
          fi
        env:
          TZ: Asia/Shanghai
